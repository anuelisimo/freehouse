name: Backfill historical USD

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (true = no changes, false = apply changes)"
        required: true
        default: "true"

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install @supabase/supabase-js node-fetch

      - name: Run backfill script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: node scripts/backfill-historical-usd.mjs
